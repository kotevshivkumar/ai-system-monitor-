<!DOCTYPE html>
<html>
<head>
    <title>AI Monitoring Dashboard</title>

    <style>
        body{
            background:#121212;
            color:white;
            font-family:Arial;
            padding:30px;
        }

        h1{
            text-align:center;
        }

        .container{
            display:flex;
            flex-wrap:wrap;
            gap:20px;
            justify-content:center;
        }

        .card{
            background:#1f1f1f;
            padding:20px;
            width:350px;
            border-radius:12px;
            box-shadow:0 0 10px rgba(255,255,255,0.1);
        }

        .online{
            color:lime;
            font-weight:bold;
        }

        h2{
            color:#00d4ff;
        }
    </style>

</head>

<body>

<h1>🖥 AI Monitoring Dashboard</h1>

<div class="container">

{% for hostname, data in devices.items() %}

<div class="card">

<h2>{{ hostname }}</h2>

<p><b>Operating System:</b> {{ data.operating_system }}</p>

<p><b>CPU Usage:</b> {{ data.cpu_usage }} %</p>

<p><b>RAM Usage:</b> {{ data.ram_usage }} %</p>

<p><b>Disk Usage:</b> {{ data.disk_usage }} %</p>

<p class="online">🟢 ONLINE</p>

</div>

{% endfor %}

</div>

</body>
</html>
